<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* ==================== ОСНОВНЫЕ СТИЛИ ==================== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            color: white;
            min-height: 100vh;
            padding: 15px;
            text-align: center;
        }
        .screen { display: none; }
        .screen.active { display: block; }
        h1 { font-size: 22px; margin: 10px 0; }
        h2 { font-size: 18px; margin: 10px 0; }
        .emoji-big { font-size: 50px; }
        .subtitle { color: #aaa; font-size: 13px; margin-bottom: 12px; }

        /* ==================== КАРТОЧКИ ==================== */
        .card {
            background: rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 18px;
            margin: 10px 0;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* ==================== ПОЛЯ ВВОДА ==================== */
        input, textarea {
            width: 100%;
            padding: 12px 14px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.08);
            color: white;
            font-size: 15px;
            margin: 6px 0;
            outline: none;
        }
        input::placeholder, textarea::placeholder { color: #888; }

        /* ==================== КНОПКИ ==================== */
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            margin: 5px 0;
            transition: all 0.2s;
        }
        .btn:active { transform: scale(0.97); }
        .btn-primary { background: #2AABEE; color: white; }
        .btn-secondary { background: rgba(255,255,255,0.12); color: white; }
        .btn-success { background: #4CAF50; color: white; }
        .btn-danger { background: #e74c3c; color: white; }
        .btn-gold { background: linear-gradient(135deg, #f9a825, #ff8f00); color: #000; }
        .btn-sm { padding: 10px; font-size: 13px; width: auto; }

        /* ==================== КОНВЕРТЫ ==================== */
        .envelope-container {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin: 20px 0;
        }
        .envelope {
            width: 130px;
            height: 100px;
            background: linear-gradient(145deg, #e8c96a, #d4a853);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 45px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
            border: 3px dashed #b8922e;
        }
        .envelope:active { transform: scale(0.95); }
        .envelope.opened {
            background: linear-gradient(145deg, #2ecc71, #27ae60);
            border-color: #1e8449;
            animation: openAnim 0.5s ease;
        }
        .envelope.locked { opacity: 0.35; cursor: not-allowed; background: #555; border-color: #444; }
        @keyframes openAnim {
            0% { transform: scale(1); }
            50% { transform: scale(1.2) rotate(5deg); }
            100% { transform: scale(1); }
        }
        @keyframes shake {
            0%,100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        .shaking { animation: shake 0.3s ease; }

        /* ==================== ТЕКСТ РЕЗУЛЬТАТА ==================== */
        .result-text {
            font-size: 17px;
            font-weight: bold;
            margin: 10px 0;
            padding: 12px;
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
        }
        .code-box {
            font-size: 30px;
            font-weight: bold;
            letter-spacing: 6px;
            color: #FFD700;
            padding: 10px;
        }
        .hidden { display: none; }

        /* ==================== СЕТКА ШАБЛОНОВ ==================== */
        .templates-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin: 10px 0;
        }
        .template-card {
            background: rgba(255,255,255,0.08);
            border-radius: 12px;
            padding: 12px 8px;
            cursor: pointer;
            text-align: center;
            font-size: 14px;
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.2s;
        }
        .template-card:active { background: rgba(42,171,238,0.3); transform: scale(0.96); }

        /* ==================== ПРОФИЛЬ ==================== */
        .profile-stat {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .profile-stat:last-child { border-bottom: none; }

        /* ==================== КОНФЕТТИ ==================== */
        .confetti {
            position: fixed;
            top: -10px;
            font-size: 24px;
            animation: fall linear forwards;
            z-index: 999;
            pointer-events: none;
        }
        @keyframes fall {
            to { transform: translateY(110vh) rotate(720deg); opacity: 0; }
        }
    </style>
</head>
<body>

<!-- ==================== ГЛАВНОЕ МЕНЮ ==================== -->
<div id="menu" class="screen active">
    <div class="emoji-big">🎭</div>
    <h1>СЛЕПОЙ ВЫБОР</h1>
    <p class="subtitle">Принимай решения с друзьями!</p>
    <button class="btn btn-primary" onclick="showScreen('create')">🎯 Создать выбор</button>
    <button class="btn btn-secondary" onclick="showTemplates()">📋 Готовые темы</button>
    <button class="btn btn-secondary" onclick="showScreen('join')">🎁 Открыть конверт</button>
    <button class="btn btn-secondary" onclick="showScreen('fun')">💰 Шуточный бюджет</button>
    <button class="btn btn-secondary" onclick="showProfile()">👤 Профиль</button>
    <button class="btn btn-secondary" onclick="openBot()">💬 Открыть бота</button>
</div>

<!-- ==================== СОЗДАНИЕ ВЫБОРА ==================== -->
<div id="create" class="screen">
    <h2>🎯 Создать выбор</h2>
    <p class="subtitle" id="stepInfo">Шаг 1 из 3: Введи тему</p>
    <div class="card">
        <input type="text" id="themeInput" placeholder="Например: Что заказать на ужин?">
        <input type="text" id="opt1Input" class="hidden" placeholder="Вариант 1: Пицца 🍕">
        <input type="text" id="opt2Input" class="hidden" placeholder="Вариант 2: Суши 🍣">
    </div>
    <button class="btn btn-primary" id="nextBtn" onclick="nextStep()">Далее ➡️</button>
    <button class="btn btn-secondary" onclick="showScreen('menu')">⬅️ Назад</button>
</div>

<!-- ==================== ВЫБОР СОЗДАН ==================== -->
<div id="created" class="screen">
    <h2>✅ Выбор создан!</h2>
    <div class="card">
        <p>Код для друга:</p>
        <p class="code-box" id="codeDisplay">------</p>
        <p id="createdTheme" style="color:#aaa;margin-top:5px;"></p>
    </div>
    <button class="btn btn-primary" onclick="shareCode()">📤 Поделиться с другом</button>
    <button class="btn btn-secondary" onclick="copyCode()">📋 Скопировать код</button>
    <button class="btn btn-secondary" onclick="showScreen('menu')">🏠 В меню</button>
</div>

<!-- ==================== ШАБЛОНЫ ==================== -->
<div id="templates" class="screen">
    <h2>📋 Готовые темы</h2>
    <div class="templates-grid" id="templatesGrid"></div>
    <button class="btn btn-secondary" onclick="showScreen('menu')">⬅️ Назад</button>
</div>

<!-- ==================== КОНВЕРТЫ ==================== -->
<div id="envelopes" class="screen">
    <h2>📨 Выбери конверт!</h2>
    <p class="subtitle" id="themeDisplay"></p>
    <div class="envelope-container">
        <div class="envelope" id="env1" onclick="openEnvelope(0)">📩</div>
        <div class="envelope" id="env2" onclick="openEnvelope(1)">📩</div>
    </div>
    <div id="resultBlock" class="hidden">
        <p class="result-text" id="resultText"></p>
        <button class="btn btn-primary" onclick="showScreen('menu')">🏠 В меню</button>
    </div>
</div>

<!-- ==================== ВВОД КОДА ==================== -->
<div id="join" class="screen">
    <h2>🔑 Введи код</h2>
    <div class="card">
        <input type="text" id="codeInput" placeholder="6-значный код" maxlength="6" style="text-align:center;font-size:24px;letter-spacing:6px;">
    </div>
    <button class="btn btn-primary" onclick="joinGame()">🎁 Открыть конверты</button>
    <button class="btn btn-secondary" onclick="showScreen('menu')">⬅️ Назад</button>
    <p id="joinError" style="color:#e74c3c;margin-top:10px;" class="hidden"></p>
</div>

<!-- ==================== ШУТОЧНЫЙ БЮДЖЕТ ==================== -->
<div id="fun" class="screen">
    <h2>💰 Шуточный бюджет</h2>
    <div class="card">
        <input type="number" id="budgetInput" placeholder="Введи сумму (₽)">
    </div>
    <button class="btn btn-primary" onclick="calcFun()">🎲 Что можно купить?</button>
    <div id="funResult" class="hidden">
        <div class="card">
            <p id="funText" style="font-size:18px;"></p>
        </div>
    </div>
    <button class="btn btn-secondary" onclick="showScreen('menu')">⬅️ Назад</button>
</div>

<!-- ==================== ПРОФИЛЬ ==================== -->
<div id="profile" class="screen">
    <h2>👤 Профиль</h2>
    <div class="card">
        <p style="font-size:20px;margin-bottom:10px;" id="profileName"></p>
        <div class="profile-stat"><span>🎯 Игр создано:</span><span id="profileCreated">0</span></div>
        <div class="profile-stat"><span>🎁 Конвертов открыто:</span><span id="profileOpened">0</span></div>
        <div class="profile-stat"><span>📅 Сегодня:</span><span id="profileToday">0</span></div>
    </div>
    <button class="btn btn-secondary" onclick="showScreen('menu')">⬅️ Назад</button>
</div>

<script>
    // ==================== TELEGRAM API ====================
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    // ==================== НАСТРОЙКИ ====================
    const BOT_API_URL = 'https://blind-bot-production.up.railway.app/webapp';
    const BOT_USERNAME = 'SlepoyVibor_bot';

    // ==================== ШАБЛОНЫ (ЛЕГКО ДОБАВЛЯТЬ/МЕНЯТЬ) ====================
    const TEMPLATES = [
        { emoji: "🍽️", theme: "Еда", opts: ["Пицца с ананасами 🍕", "Доширак с яйцом 🍜"] },
        { emoji: "☕", theme: "Напитки", opts: ["Сладкий кофе 🥤", "Чай с лимоном 🍋"] },
        { emoji: "📅", theme: "Понедельник", opts: ["Делать дела 💪", "Прикинуться больным 🤒"] },
        { emoji: "🧹", theme: "Уборка", opts: ["Помыть посуду 🍽️", "Оставить на завтра 🗓️"] },
        { emoji: "🚍", theme: "Транспорт", opts: ["Такси 🚕", "Пешком 🚶"] },
        { emoji: "💔", theme: "Свидание", opts: ["McDonald's 🍔", "Покормить уток 🦆"] },
        { emoji: "💸", theme: "Зарплата", opts: ["Купить хлам 📦", "Заплатить долги 💳"] },
        { emoji: "🍻", theme: "Пятница", opts: ["Тусовка 🎉", "Сериал 📺"] },
        { emoji: "🏃", theme: "Спорт", opts: ["Зал 🏋️", "Диван 🛋️"] },
        { emoji: "👗", theme: "Покупка", opts: ["Кроссовки 👟", "Еда 🍔"] },
    ];

    // ==================== ШУТОЧНЫЙ БЮДЖЕТ (ЛЕГКО МЕНЯТЬ) ====================
    const FUN_BUDGET = [
        { max: 500, items: ["Доширак 🍜", "Жвачка 🍬", "Проезд на маршрутке 🚌", "Газета 📰"] },
        { max: 1000, items: ["Шаурма 🌯", "Кино 🎬", "Чипсы и кола 🥤", "Лотерейный билет 🎫"] },
        { max: 3000, items: ["Пицца 🍕", "Бургерная 🍔", "Такси 🚕", "Книга 📚"] },
        { max: 5000, items: ["Ресторан 🍷", "Караоке 🎤", "Кроссовки 👟", "Настолка 🎲"] },
        { max: 10000, items: ["Концерт 🎸", "СПА 💆", "Вечеринка 🎉", "Умные часы ⌚"] },
        { max: 999999999, items: ["Поездка в горы 🏔️", "Аэротруба 💨", "Парашют 🪂", "Мишлен-ресторан 🌟"] },
    ];

    // ==================== ДАННЫЕ ИГРЫ ====================
    let currentStep = 0;
    let theme = '', opt1 = '', opt2 = '', currentCode = '';
    let gameData = null;
    let envelopeOpened = false;

    // ==================== НАВИГАЦИЯ ====================
    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if (id === 'create') resetCreate();
        if (id === 'join') {
            document.getElementById('codeInput').value = '';
            document.getElementById('joinError').classList.add('hidden');
        }
        if (id === 'fun') {
            document.getElementById('budgetInput').value = '';
            document.getElementById('funResult').classList.add('hidden');
        }
    }

    function openBot() { tg.openTelegramLink('https://t.me/' + BOT_USERNAME); }

    // ==================== СОЗДАНИЕ ВЫБОРА ====================
    function resetCreate() {
        currentStep = 0; theme = ''; opt1 = ''; opt2 = '';
        document.getElementById('themeInput').value = '';
        document.getElementById('opt1Input').value = '';
        document.getElementById('opt2Input').value = '';
        document.getElementById('themeInput').classList.remove('hidden');
        document.getElementById('opt1Input').classList.add('hidden');
        document.getElementById('opt2Input').classList.add('hidden');
        document.getElementById('stepInfo').textContent = 'Шаг 1 из 3: Введи тему';
        document.getElementById('nextBtn').textContent = 'Далее ➡️';
    }

    function nextStep() {
        if (currentStep === 0) {
            theme = document.getElementById('themeInput').value.trim();
            if (!theme) { shakeEl(document.getElementById('themeInput')); return; }
            document.getElementById('themeInput').classList.add('hidden');
            document.getElementById('opt1Input').classList.remove('hidden');
            document.getElementById('stepInfo').textContent = 'Шаг 2 из 3: Введи первый вариант';
            currentStep = 1;
        } else if (currentStep === 1) {
            opt1 = document.getElementById('opt1Input').value.trim();
            if (!opt1) { shakeEl(document.getElementById('opt1Input')); return; }
            document.getElementById('opt1Input').classList.add('hidden');
            document.getElementById('opt2Input').classList.remove('hidden');
            document.getElementById('stepInfo').textContent = 'Шаг 3 из 3: Введи второй вариант';
            document.getElementById('nextBtn').textContent = '🎉 Создать!';
            currentStep = 2;
        } else if (currentStep === 2) {
            opt2 = document.getElementById('opt2Input').value.trim();
            if (!opt2) { shakeEl(document.getElementById('opt2Input')); return; }
            createChoice();
        }
    }

    function createChoice() {
        const code = Math.floor(100000 + Math.random() * 900000).toString();
        currentCode = code;
        gameData = { theme, options: [opt1, opt2].sort(() => Math.random() - 0.5), done: false };
        saveGame(code, gameData);
        incrementStat('created');
        document.getElementById('codeDisplay').textContent = code;
        document.getElementById('createdTheme').textContent = 'Тема: ' + theme;
        showScreen('created');
        spawnConfetti();
    }

    // ==================== ШАБЛОНЫ ====================
    function showTemplates() {
        showScreen('templates');
        const grid = document.getElementById('templatesGrid');
        grid.innerHTML = '';
        TEMPLATES.forEach((t, i) => {
            const div = document.createElement('div');
            div.className = 'template-card';
            div.innerHTML = `${t.emoji}<br>${t.theme}`;
            div.onclick = () => useTemplate(i);
            grid.appendChild(div);
        });
    }

    function useTemplate(index) {
        const t = TEMPLATES[index];
        const code = Math.floor(100000 + Math.random() * 900000).toString();
        currentCode = code;
        gameData = { theme: t.theme, options: t.opts.sort(() => Math.random() - 0.5), done: false };
        saveGame(code, gameData);
        incrementStat('created');
        document.getElementById('codeDisplay').textContent = code;
        document.getElementById('createdTheme').textContent = 'Тема: ' + t.theme;
        showScreen('created');
        spawnConfetti();
    }

    // ==================== КОНВЕРТЫ ====================
    function joinGame() {
        const code = document.getElementById('codeInput').value.trim();
        if (!code || code.length !== 6) {
            showError('Введи 6-значный код'); return;
        }
        const game = getGame(code);
        if (!game) { showError('Игра не найдена!'); return; }
        if (game.done) { showError('Игра уже завершена!'); return; }
        gameData = game;
        currentCode = code;
        document.getElementById('themeDisplay').textContent = 'Тема: ' + game.theme;
        document.getElementById('resultBlock').classList.add('hidden');
        document.getElementById('env1').classList.remove('opened', 'locked');
        document.getElementById('env2').classList.remove('opened', 'locked');
        envelopeOpened = false;
        document.getElementById('joinError').classList.add('hidden');
        showScreen('envelopes');
    }

    function openEnvelope(index) {
        if (envelopeOpened || !gameData || gameData.done) return;
        envelopeOpened = true;
        gameData.done = true;
        saveGame(currentCode, gameData);
        incrementStat('opened');
        const chosen = gameData.options[index];
        document.getElementById('env' + (index + 1)).classList.add('opened');
        document.getElementById('env' + (2 - index)).classList.add('locked');
        setTimeout(() => {
            document.getElementById('resultText').innerHTML = `🎉 Ты выбрал: <b>${chosen}</b><br><br>🔒 Второй вариант скрыт!`;
            document.getElementById('resultBlock').classList.remove('hidden');
            spawnConfetti();
            sendToBot(`🎲 Выбор сделан!\nТема: ${gameData.theme}\nВыбрано: ${chosen}`);
        }, 600);
    }

    function showError(msg) {
        document.getElementById('joinError').textContent = msg;
        document.getElementById('joinError').classList.remove('hidden');
    }

    // ==================== ШУТОЧНЫЙ БЮДЖЕТ ====================
    function calcFun() {
        const budget = parseInt(document.getElementById('budgetInput').value);
        if (!budget || budget <= 0) { shakeEl(document.getElementById('budgetInput')); return; }
        const tier = FUN_BUDGET.find(t => budget <= t.max) || FUN_BUDGET[FUN_BUDGET.length - 1];
        const items = tier.items;
        const picks = items.sort(() => Math.random() - 0.5).slice(0, 2);
        document.getElementById('funText').innerHTML = `💸 Бюджет: <b>${budget}₽</b><br><br>🎲 ${picks[0]}<br>или<br>🎲 ${picks[1]}`;
        document.getElementById('funResult').classList.remove('hidden');
    }

    // ==================== ПРОФИЛЬ ====================
    function showProfile() {
        showScreen('profile');
        const user = tg.initDataUnsafe?.user;
        document.getElementById('profileName').textContent = user?.first_name || 'Игрок';
        document.getElementById('profileCreated').textContent = getStat('created');
        document.getElementById('profileOpened').textContent = getStat('opened');
        document.getElementById('profileToday').textContent = getTodayCount();
    }

    // ==================== КНОПКИ ПОДЕЛИТЬСЯ ====================
    function shareCode() {
        const text = `🎲 Слепой выбор!\nТема: ${gameData?.theme || '???'}\nКод: ${currentCode}\n\nОткрой @${BOT_USERNAME} и введи код!`;
        tg.openTelegramLink(`https://t.me/share/url?url=&text=${encodeURIComponent(text)}`);
    }

    function copyCode() {
        navigator.clipboard.writeText(currentCode).then(() => {
            tg.showPopup({ title: '✅', message: 'Код скопирован!' });
        }).catch(() => tg.showPopup({ title: '📋', message: 'Код: ' + currentCode }));
    }

    // ==================== ХРАНИЛИЩЕ ИГР (localStorage) ====================
    function saveGame(code, data) {
        const games = JSON.parse(localStorage.getItem('blindGames') || '{}');
        games[code] = data;
        localStorage.setItem('blindGames', JSON.stringify(games));
    }

    function getGame(code) {
        const games = JSON.parse(localStorage.getItem('blindGames') || '{}');
        return games[code] || null;
    }

    // ==================== СТАТИСТИКА (localStorage) ====================
    function getStat(key) {
        const stats = JSON.parse(localStorage.getItem('blindStats') || '{}');
        return stats[key] || 0;
    }

    function incrementStat(key) {
        const stats = JSON.parse(localStorage.getItem('blindStats') || '{}');
        stats[key] = (stats[key] || 0) + 1;
        const today = new Date().toDateString();
        stats['today_' + today] = (stats['today_' + today] || 0) + 1;
        localStorage.setItem('blindStats', JSON.stringify(stats));
    }

    function getTodayCount() {
        const stats = JSON.parse(localStorage.getItem('blindStats') || '{}');
        const today = new Date().toDateString();
        return stats['today_' + today] || 0;
    }

    // ==================== ОТПРАВКА В БОТА ====================
    async function sendToBot(msg) {
        try {
            await fetch(BOT_API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ initData: tg.initData, message: msg })
            });
        } catch(e) { console.log('Бот не доступен'); }
    }

    // ==================== КОНФЕТТИ ====================
    function spawnConfetti() {
        const emojis = ['🎉', '🎊', '✨', '🌟', '💫', '🎯', '🎲', '🎁', '🔥', '💎'];
        for (let i = 0; i < 20; i++) {
            setTimeout(() => {
                const el = document.createElement('div');
                el.className = 'confetti';
                el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
                el.style.left = Math.random() * 100 + '%';
                el.style.animationDuration = (1.5 + Math.random() * 2) + 's';
                document.body.appendChild(el);
                setTimeout(() => el.remove(), 3000);
            }, i * 30);
        }
    }

    function shakeEl(el) {
        el.classList.add('shaking');
        setTimeout(() => el.classList.remove('shaking'), 300);
    }
</script>
</body>
</html>
